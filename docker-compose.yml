services:
  db:
    image: postgres:15-alpine
    container_name: flacky_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    image: adminer
    container_name: flacky_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db
volumes:
  postgres_data:
